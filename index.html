<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>數獨 4x4</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <p class="eyebrow">Sudoku</p>
          <h1 id="gameTitle">數獨 4x4</h1>
        </div>

        <div class="top-actions" aria-label="遊戲設定">
          <label class="field">
            <span>規格</span>
            <select id="sizeSelect"></select>
          </label>
          <label class="field">
            <span>難度</span>
            <select id="difficultySelect">
              <option value="easy">輕鬆</option>
              <option value="normal" selected>標準</option>
              <option value="hard">挑戰</option>
            </select>
          </label>
          <button class="primary-button" id="newGameBtn" type="button">新局</button>
        </div>
      </header>

      <section class="game-layout" aria-label="數獨遊戲">
        <div class="board-panel">
          <div id="sudokuBoard" class="sudoku-board" role="grid" aria-label="數獨棋盤"></div>
          <p id="message" class="status-message" aria-live="polite"></p>
        </div>

        <aside class="control-panel" aria-label="遊戲控制">
          <div class="stats" aria-label="遊戲狀態">
            <div class="stat">
              <span>時間</span>
              <strong id="timer">00:00</strong>
            </div>
            <div class="stat">
              <span>空格</span>
              <strong id="remaining">0</strong>
            </div>
            <div class="stat">
              <span>提示</span>
              <strong id="hints">0</strong>
            </div>
          </div>

          <div class="tool-grid">
            <button id="noteBtn" class="tool-button" type="button" aria-pressed="false">筆記</button>
            <button id="eraseBtn" class="tool-button" type="button">清除</button>
            <button id="hintBtn" class="tool-button" type="button">提示</button>
            <button id="checkBtn" class="tool-button" type="button">檢查</button>
            <button id="zoomBtn" class="tool-button zoom-button" type="button" aria-pressed="false">放大</button>
          </div>

          <div id="keypad" class="keypad" aria-label="數字鍵盤"></div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
